<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Agenda de Citas Psicológicas</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-tenant="neumann">

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <img id="splash-logo" src="https://d30mzt1bxg5llt.cloudfront.net/public/uploads/images/LOGO-NEUMANN.png" alt="Logo">
    <h2 id="splash-title">Bienestar Estudiantil</h2>
    <div class="loader"></div>
  </div>

  <div id="toast">Notificación</div>

  <!-- MAIN APP -->
  <div class="app-container">
    <header class="top-header">
      <img id="header-logo" src="https://d30mzt1bxg5llt.cloudfront.net/public/uploads/images/LOGO-NEUMANN.png" alt="Logo">
      <h1>Reserva tu Cita</h1>
      <p class="subtitle">Acompañamiento psicológico confidencial</p>
    </header>

    <main class="main-content">
      <section class="step-section">
        <h2 class="step-title">1. Elige una fecha</h2>
        <div class="date-carousel" id="date-carousel">
          <!-- Chips de fechas generados por JS -->
        </div>
      </section>

      <section class="step-section" id="time-section" style="display: none;">
        <h2 class="step-title" id="selected-date-text">2. Horarios disponibles</h2>
        <div class="time-grid" id="time-grid">
          <!-- Botones de horas generados por JS -->
        </div>
      </section>
    </main>
  </div>

  <!-- MODAL FORMULARIO -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <button class="close-btn" id="close-modal">&times;</button>
        <h2>Confirma tu Cita</h2>
        <p id="modal-datetime-info">Fecha y Hora</p>
      </div>
      
      <div class="modal-body">
        <form id="appointment-form">
          <input type="hidden" name="fecha_hora_iso" id="hidden-datetime">
          <input type="hidden" name="instituto" id="hidden-instituto">

          <div class="input-group">
            <input type="text" name="nombres_apellidos" id="nombres_apellidos" required placeholder=" ">
            <label for="nombres_apellidos">Nombres y Apellidos completos</label>
          </div>

          <div class="input-group">
            <input type="email" name="correo" id="correo" required placeholder=" ">
            <label for="correo">Correo Institucional</label>
          </div>

          <div class="row-group">
            <div class="input-group">
              <input type="tel" name="telefono" id="telefono" required placeholder=" " pattern="[0-9]{9,15}">
              <label for="telefono">WhatsApp</label>
            </div>
            <div class="input-group">
              <input type="number" name="edad" id="edad" required placeholder=" " min="15" max="99">
              <label for="edad">Edad</label>
            </div>
          </div>

          <div class="row-group">
            <div class="input-group select-group">
              <select name="ciclo" id="ciclo" required>
                <option value="" disabled selected>Selecciona tu ciclo</option>
                <option value="I">Ciclo I</option>
                <option value="II">Ciclo II</option>
                <option value="III">Ciclo III</option>
                <option value="IV">Ciclo IV</option>
                <option value="V">Ciclo V</option>
                <option value="VI">Ciclo VI</option>
                <option value="Otro">Otro</option>
              </select>
              <label for="ciclo">Ciclo</label>
            </div>
            <div class="input-group select-group">
              <select name="carrera" id="carrera" required>
                <option value="" disabled selected>Selecciona tu carrera</option>
                <option value="ADNI">Admin. de Negocios Int.</option>
                <option value="Contabilidad">Contabilidad</option>
                <option value="Administración">Administración</option>
                <option value="Ingeniería">Ingeniería</option>
              </select>
              <label for="carrera">Carrera</label>
            </div>
          </div>

          <div class="input-group">
            <input type="text" name="convivencia" id="convivencia" required placeholder=" ">
            <label for="convivencia">¿Con quién vives?</label>
          </div>

          <div class="input-group">
            <textarea name="motivo" id="motivo" required placeholder=" " rows="2"></textarea>
            <label for="motivo">Cuéntame brevemente el motivo de tu consulta</label>
          </div>

          <button type="submit" class="btn-primary" id="btn-submit">Agendar Cita</button>
        </form>
      
        <!-- ESTADO DE ÉXITO -->
        <div id="success-state" style="display: none; text-align: center; padding: 40px 0 20px;">
          <div class="success-icon">✓</div>
          <h2 style="color: var(--success); margin-bottom: 10px;">¡Cita Confirmada!</h2>
          <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">Tu reserva ha sido registrada exitosamente. Hemos enviado los detalles a tu correo electrónico.</p>
          <button class="btn-primary" id="btn-done" style="background-color: var(--success); border-color: var(--success);">Entendido</button>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
